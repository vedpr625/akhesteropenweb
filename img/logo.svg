<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy filled circle mark -->
  <circle cx="20" cy="20" r="16" fill="#1B4F8A"/>
  <!-- Teal arc — health accent -->
  <path d="M8 20 C8 13.4 13.4 8 20 8 C23.2 8 26.1 9.3 28.2 11.4"
        stroke="#1A9E90" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M28.2 11.4 C26.1 9.3 23.2 8 20 8 C13.4 8 8 13.4 8 20 C8 26.6 13.4 32 20 32"
        stroke="#90C4F0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- AJ on filled circle — white -->
  <text x="20" y="25"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
        font-size="13" font-weight="700" fill="white" text-anchor="middle">AJ</text>
  <!-- Wordmark — navy -->
  <text x="46" y="27"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="19" font-weight="700" letter-spacing="-0.4"
        fill="#0D1F33">FHIR</text>
  <!-- Divider -->
  <rect x="96" y="10" width="1" height="20" fill="#B8D4E8"/>
  <!-- Descriptor -->
  <text x="104" y="21"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
        font-size="10" font-weight="600" letter-spacing="0.07em"
        fill="#5A8AA8">PLATFORM</text>
  <text x="104" y="32"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
        font-size="9" font-weight="400" fill="#6AAAC8">by AJ Smart</text>
</svg>
